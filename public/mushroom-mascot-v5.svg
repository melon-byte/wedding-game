           C 223 203, 253 208, 293 218
           C 330 228, 355 236, 355 220
           C 355 250, 330 240, 290 232
           C 248 240, 222 238, 200 238
           C 178 238, 152 240, 110 232
           C 70 240, 45 250, 45 220 Z"
