  <path d="M 200 48
           C 95 48, 35 140, 35 212
           C 35 232, 65 222, 105 212
           C 145 202, 175 197, 200 197
           C 225 197, 255 202, 295 212
           C 335 222, 365 232, 365 212
           C 365 140, 305 48, 200 48 Z"
        fill="url(#capGrad)" filter="url(#fluffy)" opacity="0.35"/>

  <ellipse cx="140" cy="135" rx="14" ry="10" fill="#fff" opacity="0.9" transform="rotate(-15 140 135)"/>
  <ellipse cx="260" cy="120" rx="11" ry="8" fill="#fff" opacity="0.85" transform="rotate(10 260 120)"/>
  <ellipse cx="200" cy="100" rx="16" ry="11" fill="#fff" opacity="0.9"/>
