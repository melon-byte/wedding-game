           C 335 222, 365 232, 365 212
           C 365 255, 332 242, 290 228
           C 248 245, 220 242, 200 242
           C 180 242, 152 245, 110 228
           C 68 242, 35 255, 35 212 Z"
        fill="url(#rimGrad)"/>

  <path d="M 45 220
