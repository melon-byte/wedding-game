  <ellipse cx="80" cy="205" rx="5" ry="4" fill="#fff" opacity="0.55" transform="rotate(-20 80 205)"/>

  <ellipse cx="170" cy="95" rx="35" ry="20" fill="#fff" opacity="0.12" transform="rotate(-10 170 95)"/>

  <ellipse cx="200" cy="272" rx="74" ry="55" fill="url(#faceGrad)"/>
  <ellipse cx="200" cy="272" rx="74" ry="55" fill="url(#fluffy)" opacity="0.15"/>

  <circle cx="172" cy="255" r="7" fill="#2d2d2d"/>
  <circle cx="174" cy="253" r="2.5" fill="#fff" opacity="0.85"/>
  <circle cx="228" cy="255" r="7" fill="#2d2d2d"/>
  <circle cx="230" cy="253" r="2.5" fill="#fff" opacity="0.85"/>

  <ellipse cx="155" cy="270" rx="18" ry="12" fill="url(#blushGrad)"/>
